services:
  flanufactured:
    build: .
    container_name: flanufactured
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY:-changeme}
      - DEFAULT_LOCALE=${DEFAULT_LOCALE:-en_US}
      - MAX_ROWS=${MAX_ROWS:-10000}
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
